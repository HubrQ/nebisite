<div class="sidenav" [ngClass]="isLeftSidebarCollapsed() ? 'sidenav-collapsed' : '' ">
    <div class="logo-container">
        <button class="logo" (click)="toggleCollapse()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 512" class="sidenav-link-icon-logo"><!--!Font Awesome Free v7.1.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2025 Fonticons, Inc.--><path d="M64 144a56 56 0 1 1 0-112 56 56 0 1 1 0 112zm0 224c30.9 0 56 25.1 56 56s-25.1 56-56 56-56-25.1-56-56 25.1-56 56-56zm56-112c0 30.9-25.1 56-56 56s-56-25.1-56-56 25.1-56 56-56 56 25.1 56 56z" fill="currentColor"/></svg>
        </button>
        <div class="logo-text" [class.collapsed]="isLeftSidebarCollapsed()">Nebi's site</div>
    </div>
<div class ="sidenav-nav">
            @for (item of items; track $index)
            {
  <li class="sidenav-nav-item">
            <!-- ACTION -->
      <ng-container *ngIf="item.action; else linkItem">
        <button
          type="button"
          class="sidenav-nav-link"
          (click)="onActionClick(item.action)">
             <span
                 class="sidenav-link-icon"
                [class.dark]="darkMode()"
                [class.light]="!darkMode()"
                [innerHTML]="item.icon">
              </span>
              <span class="sidenav-link-text">{{ item.label }}</span>
         </button>
        </ng-container>

      <!-- LINKS -->
      <ng-template #linkItem>
        <a *ngIf="item.external; else internal"
           class="sidenav-nav-link"
           [href]="item.routeLink"
           rel="noopener noreferrer">
          <span class="sidenav-link-icon" [innerHTML]="item.icon"></span>
          <span class="sidenav-link-text">{{ item.label }}</span>
        </a>

        <ng-template #internal>
          <a class="sidenav-nav-link"
             [routerLink]="item.routeLink"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: true }">
            <span class="sidenav-link-icon" [innerHTML]="item.icon"></span>
            <span class="sidenav-link-text">{{ item.label }}</span>
          </a>
        </ng-template>
      </ng-template>

    </li>
            }
        </div>

</div>
