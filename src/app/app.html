<app-sidebar  [isLeftSidebarCollapsed]="isLeftSidebarCollapsed()"
        [darkMode]="darkMode"
(toggleIsLeftSidebarCollapsed)="toggleIsLeftSidebarCollapsed($event)"
(toggleDarkMode)="toggleDarkMode()" 
></app-sidebar>
<div class="body" [ngClass]="[
       !isLeftSidebarCollapsed() ? 'body-trimmed' : '',
       darkMode ? 'dark' : 'light'
     ]">
    <router-outlet></router-outlet>
</div>
